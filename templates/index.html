<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Trading Desk</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

<style>
body { background:#0f172a; color:#e2e8f0; font-family:Arial; margin:0; }
.wrap { padding:20px; max-width:1400px; margin:auto; }
.card { background:#111827; padding:16px; border-radius:12px; margin-bottom:16px; }
button { padding:10px; border-radius:8px; border:none; cursor:pointer; }
.mode-btn { background:#1f2937; color:#fff; }
.mode-btn.active { background:#2563eb; }
.table { width:100%; border-collapse:collapse; }
.table th, .table td { padding:6px; border-bottom:1px solid #333; }
</style>
</head>

<body>
<div class="wrap">

<h1>Trading Desk</h1>
<div id="debug"></div>

<div>
<button class="mode-btn active" onclick="setView('live')" id="btnLive">LIVE</button>
<button class="mode-btn" onclick="setView('backtest')" id="btnBT">BACKTEST</button>
</div>

<div id="liveView">
<div class="card">
<h3>ZScore</h3>
<div id="liveChart"></div>
</div>
</div>

<div id="backtestView" style="display:none">

<div class="card">
<h3>Parámetros</h3>

Entry Z:
<select id="entryZ">
<option>1.5</option>
<option selected>2.0</option>
<option>2.5</option>
</select>

Exit Z:
<select id="exitZ">
<option selected>0</option>
<option>0.5</option>
</select>

Capital:
<input id="capital" value="1000000"/>

Cost:
<input id="cost" value="0.003"/>

<button onclick="runBacktest()">RUN<button onclick="runOptimizer()">OPTIMIZER</button>
</div>
<div class="card">
<h3>Optimizer</h3>
<div id="optimizer"></div>
</div>

<div class="card">
<h3>Equity</h3>
<div id="equityChart"></div>
</div>

<div class="card">
<h3>Trades</h3>
<table class="table">
<thead>
<tr>
<th>Entry</th>
<th>Exit</th>
<th>Side</th>
<th>PnL</th>
</tr>
</thead>
<tbody id="trades"></tbody>
</table>
</div>

</div>

</div>


<script>
let view = 'live'

function setView(v){
view=v
document.getElementById('liveView').style.display = v==='live'?'block':'none'
document.getElementById('backtestView').style.display = v==='backtest'?'block':'none'
}

async function loadLive(){
const r = await fetch('/api/state')
const j = await r.json()
const pair = Object.keys(j.zscore_history)[0]
const y = j.zscore_history[pair]
const x = j.series_timestamps
Plotly.newPlot('liveChart',[{x,y,type:'scatter'}])
}

async function runBacktest(){

const entry = document.getElementById('entryZ').value
const exit = document.getElementById('exitZ').value
const cap = document.getElementById('capital').value
const cost = document.getElementById('cost').value

const url = `/api/history/backtest/al30-gd30?entry_z=${entry}&exit_z=${exit}&capital=${cap}&cost=${cost}`

const r = await fetch(url)
const j = await r.json()

renderMetrics(j.metrics)
renderEquity(j.equity_curve)
renderTrades(j.trades)

}

function renderMetrics(m){
document.getElementById('metrics').innerHTML = `
PnL: ${m.total_pnl}<br>
Return: ${m.total_return_pct}%<br>
WinRate: ${m.win_rate}<br>
PF: ${m.profit_factor}<br>
DD: ${m.max_drawdown}
`
}

function renderEquity(eq){
Plotly.newPlot('equityChart',[{
x: eq.map(e=>e.date),
y: eq.map(e=>e.equity),
type:'scatter'
}])
}

function renderTrades(tr){
const tbody = document.getElementById('trades')
tbody.innerHTML=''
tr.forEach(t=>{
tbody.innerHTML += `
<tr>
<td>${t.entry_date}</td>
<td>${t.exit_date}</td>
<td>${t.side}</td>
<td>${t.pnl_money}</td>
</tr>`
})
}

async function runOptimizer(){

const cap = document.getElementById('capital').value
const cost = document.getElementById('cost').value

let results = []

for(let entry of [1.5,2,2.5,3]){
for(let exit of [0,0.5,1]){

const url = `/api/history/backtest/al30-gd30?entry_z=${entry}&exit_z=${exit}&capital=${cap}&cost=${cost}`
const r = await fetch(url)
const j = await r.json()

const m = j.metrics

const score = m.profit_factor / (1 + Math.abs(m.max_drawdown))

results.push({
entry, exit,
pnl: m.total_pnl,
pf: m.profit_factor,
dd: m.max_drawdown,
wr: m.win_rate,
score
})

}
}

results.sort((a,b)=>b.score-a.score)

renderOptimizer(results)

}

function renderOptimizer(res){

let html = `<table class="table"><tr>
<th>Entry</th><th>Exit</th><th>Score</th><th>PF</th><th>DD</th><th>WR</th><th>PnL</th>
</tr>`

res.forEach(r=>{
html += `<tr>
<td>${r.entry}</td>
<td>${r.exit}</td>
<td>${r.score.toFixed(2)}</td>
<td>${r.pf.toFixed(2)}</td>
<td>${r.dd.toFixed(2)}</td>
<td>${r.wr.toFixed(2)}</td>
<td>${r.pnl.toFixed(0)}</td>
</tr>`
})

html += `</table>`

document.getElementById('optimizer').innerHTML = html

}

loadLive()

</script>

</body>
</html>
