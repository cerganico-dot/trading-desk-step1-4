<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ARG Trading Desk</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#e2e8f0; margin:0; }
    .wrap { max-width: 1480px; margin: 0 auto; padding: 20px; }
    .grid { display:grid; grid-template-columns: repeat(12, 1fr); gap:16px; }
    .card { background:#111827; border:1px solid #1f2937; border-radius:16px; padding:16px; }
    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .muted { color:#94a3b8; font-size:12px; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:8px 10px; border-bottom:1px solid #1f2937; font-size:13px; text-align:left; }
    th { color:#93c5fd; position: sticky; top: 0; background:#111827; }
    tr:hover { background:#172554; cursor:pointer; }
    tr.active-row { background:#1d4ed8 !important; }
    .log-wrap { max-height: 340px; overflow:auto; border:1px solid #1f2937; border-radius:12px; }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; font-size:12px; }
    .buy { background:#052e16; color:#86efac; }
    .sell { background:#450a0a; color:#fca5a5; }
    .none { background:#1f2937; color:#cbd5e1; }
    .open { background:#1e3a8a; color:#bfdbfe; }
    .close { background:#3f6212; color:#d9f99d; }
    .kv { display:grid; grid-template-columns: 170px 1fr; gap:8px; font-size:14px; }
    .kv div:nth-child(odd) { color:#93c5fd; }
    .warn { color:#fca5a5; font-size:12px; margin-top:8px; }
    .ok { color:#86efac; font-size:12px; margin-top:8px; }
    .empty-row td { color:#94a3b8; text-align:center; padding:18px 10px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="card span-12">
      <h1>ARG Trading Desk</h1>
      <div class="muted" id="modeLabel">Cargando...</div>
      <div class="warn" id="debugBox"></div>
      <div class="ok" id="paperSourceBox"></div>
    </div>

    <div class="card span-4">
      <h3>Riesgo</h3>
      <div id="riskBox" class="kv"></div>
    </div>

    <div class="card span-8">
      <h3>Notas</h3>
      <ul id="notes"></ul>
    </div>

    <div class="card span-12">
      <h3>Z-Score histórico</h3>
      <div id="zscoreChart" style="height:420px;"></div>
    </div>

    <div class="card span-6">
      <h3>Oportunidades</h3>
      <div class="log-wrap">
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Par</th>
              <th>Operación</th>
              <th>Z</th>
              <th>Edge</th>
              <th>Filtro</th>
            </tr>
          </thead>
          <tbody id="logBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card span-6">
      <h3>Paper trading</h3>
      <div class="log-wrap">
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Evento</th>
              <th>Par</th>
              <th>Side</th>
              <th>PnL</th>
            </tr>
          </thead>
          <tbody id="paperBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card span-6">
      <h3>Alertas enviadas</h3>
      <div class="log-wrap">
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Par</th>
              <th>Señal</th>
              <th>Z</th>
              <th>Canal</th>
            </tr>
          </thead>
          <tbody id="alertsBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card span-6">
      <h3>Posiciones abiertas</h3>
      <div class="log-wrap">
        <table>
          <thead>
            <tr>
              <th>Par</th>
              <th>Side</th>
              <th>Entry Z</th>
              <th>Entry Ratio</th>
              <th>Notional</th>
            </tr>
          </thead>
          <tbody id="positionsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let stateCache = null;
let selectedPoint = null;

function fmt(n, digits = 4) {
  if (n === null || n === undefined || n === '' || Number.isNaN(Number(n))) return '-';
  return Number(n).toLocaleString('es-AR', { maximumFractionDigits: digits });
}

function signalClass(sig) {
  return String(sig || '').startsWith('BUY') ? 'buy'
       : String(sig || '').startsWith('SELL') ? 'sell'
       : 'none';
}

function paperClass(ev) {
  const t = String(ev || '').toUpperCase();
  if (t.includes('OPEN') || t.includes('ENTRY')) return 'open';
  if (t.includes('CLOSE') || t.includes('EXIT')) return 'close';
  return 'none';
}

function normalizeIndex(v) {
  if (v === null || v === undefined || v === '') return null;
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

function renderRisk(r) {
  document.getElementById('riskBox').innerHTML = `
    <div>Capital</div><div>${fmt(r.capital,2)}</div>
    <div>Máx riesgo/trade</div><div>${fmt(r.max_risk_per_trade,2)}</div>
    <div>Máx riesgo diario</div><div>${fmt(r.max_daily_risk,2)}</div>
    <div>Gross exposure</div><div>${fmt(r.current_gross_exposure,2)}</div>
    <div>Límite exposición</div><div>${fmt(r.exposure_limit,2)}</div>
    <div>Utilización</div><div>${fmt((r.utilization_pct || 0) * 100,2)}%</div>
    <div>Status</div><div>${r.status || '-'}</div>
  `;
}

function renderNotes(notes) {
  const el = document.getElementById('notes');
  el.innerHTML = '';
  (notes || []).forEach(n => {
    const li = document.createElement('li');
    li.textContent = n;
    el.appendChild(li);
  });
}

function getSeriesKeys(s) {
  const zh = s.zscore_history || {};
  return Object.keys(zh).filter(k => Array.isArray(zh[k]) && zh[k].length);
}

function getPaperEventsSource(s) {
  const candidates = [
    ['paper_events', s.paper_events],
    ['paper_trades', s.paper_trades],
    ['paper_trade_log', s.paper_trade_log],
    ['paper_log', s.paper_log],
    ['paper_history', s.paper_history],
    ['paperTrading', s.paperTrading],
    ['trades', s.trades],
    ['events', s.events]
  ];

  for (const [name, value] of candidates) {
    if (Array.isArray(value) && value.length) {
      return { name, items: value };
    }
  }

  for (const [name, value] of candidates) {
    if (Array.isArray(value)) {
      return { name, items: value };
    }
  }

  return { name: 'none', items: [] };
}

function getEventIndexFromTime(item, x) {
  const possibleTimes = [
    item.timestamp,
    item.time,
    item.event_time,
    item.entry_time,
    item.exit_time,
    item.ts,
    item.datetime
  ].filter(Boolean).map(v => String(v));

  if (!possibleTimes.length) return null;

  for (const t of possibleTimes) {
    const exactIdx = x.findIndex(v => String(v) === t);
    if (exactIdx >= 0) return exactIdx;
  }

  for (const t of possibleTimes) {
    const partialIdx = x.findIndex(v => String(v).includes(t) || t.includes(String(v)));
    if (partialIdx >= 0) return partialIdx;
  }

  return null;
}

function resolveEventIndex(item, x) {
  const direct = normalizeIndex(item.series_index);
  if (direct !== null && direct >= 0 && direct < x.length) return direct;
  return getEventIndexFromTime(item, x);
}

function getEventPair(item, keys) {
  if (item.pair && keys.includes(item.pair)) return item.pair;

  const candidates = [
    item.pair,
    item.symbol,
    item.instrument,
    item.ticker,
    item.asset,
    item.series
  ].filter(Boolean).map(v => String(v));

  for (const c of candidates) {
    if (keys.includes(c)) return c;
  }

  for (const c of candidates) {
    const found = keys.find(k => c.includes(k) || k.includes(c));
    if (found) return found;
  }

  return item.pair || item.symbol || item.instrument || item.ticker || '-';
}

function getEventType(item) {
  return item.event_type || item.event || item.type || item.action || '-';
}

function getEventTime(item) {
  return item.time || item.timestamp || item.event_time || item.entry_time || item.exit_time || item.ts || item.datetime || '-';
}

function getEventSide(item) {
  return item.side || item.direction || item.trade_side || '-';
}

function getEventPnl(item) {
  if (item.pnl_currency !== undefined) return item.pnl_currency;
  if (item.pnl !== undefined) return item.pnl;
  if (item.realized_pnl !== undefined) return item.realized_pnl;
  if (item.unrealized_pnl !== undefined) return item.unrealized_pnl;
  return null;
}

function buildPaperEventTraces(s, x, paperItems) {
  const keys = getSeriesKeys(s);
  const grouped = {};
  let plottedCount = 0;

  paperItems.forEach(item => {
    const pair = getEventPair(item, keys);
    if (!pair || !keys.includes(pair)) return;

    const idx = resolveEventIndex(item, x);
    if (idx === null || idx < 0 || idx >= x.length) return;

    const zHistory = s.zscore_history[pair];
    if (!Array.isArray(zHistory) || zHistory[idx] === null || zHistory[idx] === undefined) return;

    if (!grouped[pair]) {
      grouped[pair] = { x: [], y: [], text: [], symbols: [], sizes: [] };
    }

    const eventType = String(getEventType(item)).toUpperCase();
    const isClose = eventType.includes('CLOSE') || eventType.includes('EXIT');
    const symbol = isClose ? 'diamond-open' : 'diamond';
    const size = isClose ? 12 : 11;

    grouped[pair].x.push(x[idx]);
    grouped[pair].y.push(zHistory[idx]);
    grouped[pair].text.push(
      [
        getEventTime(item),
        getEventType(item),
        pair,
        getEventSide(item),
        `PnL: ${fmt(getEventPnl(item), 2)}`
      ].join(' | ')
    );
    grouped[pair].symbols.push(symbol);
    grouped[pair].sizes.push(size);
    plottedCount += 1;
  });

  const traces = Object.keys(grouped).map(pair => ({
    x: grouped[pair].x,
    y: grouped[pair].y,
    text: grouped[pair].text,
    mode: 'markers',
    type: 'scatter',
    name: `Paper ${pair}`,
    marker: {
      size: grouped[pair].sizes,
      symbol: grouped[pair].symbols,
      line: { width: 2 }
    },
    hovertemplate: '%{text}<extra></extra>'
  }));

  return { traces, plottedCount };
}

function buildSelectedPointTrace(s, x) {
  if (!selectedPoint || !selectedPoint.pair) return null;
  const pair = selectedPoint.pair;
  const idx = normalizeIndex(selectedPoint.series_index);

  if (idx === null) return null;
  if (!s.zscore_history || !Array.isArray(s.zscore_history[pair])) return null;
  if (idx < 0 || idx >= x.length) return null;

  const yVal = s.zscore_history[pair][idx];
  if (yVal === null || yVal === undefined) return null;

  return {
    x: [x[idx]],
    y: [yVal],
    mode: 'markers',
    type: 'scatter',
    name: 'Selección',
    marker: { size: 16, symbol: 'circle-open-dot', line: { width: 3 } },
    hovertemplate: `${pair}<br>%{x}<br>Z: %{y}<extra></extra>`
  };
}

function renderChart(s, paperItems) {
  const x = s.series_timestamps || [];
  const zh = s.zscore_history || {};
  const keys = getSeriesKeys(s);

  if (!x.length || !keys.length) {
    document.getElementById('zscoreChart').innerHTML = '<div class="muted">Sin histórico suficiente.</div>';
    return;
  }

  const traces = keys.map(k => ({
    x: x,
    y: zh[k],
    mode: 'lines+markers',
    type: 'scatter',
    name: k,
    hovertemplate: `${k}<br>%{x}<br>Z: %{y}<extra></extra>`
  }));

  const paper = buildPaperEventTraces(s, x, paperItems);
  const selectedTrace = buildSelectedPointTrace(s, x);

  if (selectedTrace) traces.push(selectedTrace);
  traces.push(...paper.traces);

  Plotly.newPlot(
    'zscoreChart',
    traces,
    {
      paper_bgcolor:'#111827',
      plot_bgcolor:'#111827',
      font:{ color:'#e5e7eb' },
      margin:{ t:20, r:20, b:50, l:50 },
      xaxis:{ title:'Hora' },
      yaxis:{ title:'Z-Score' },
      legend:{ orientation:'h' }
    },
    { responsive:true, displayModeBar:false }
  );

  const totalEvents = Array.isArray(paperItems) ? paperItems.length : 0;
  document.getElementById('debugBox').textContent =
    totalEvents > 0 && paper.plottedCount === 0
      ? `Paper detectado: ${totalEvents} eventos, pero no se pudieron mapear al gráfico.`
      : '';
}

function setActiveRow(tbodyId, row) {
  document.querySelectorAll(`#${tbodyId} tr`).forEach(r => r.classList.remove('active-row'));
  if (row) row.classList.add('active-row');
}

function renderRows(id, items, rowBuilder, emptyMessage = 'Sin datos') {
  const body = document.getElementById(id);
  body.innerHTML = '';

  if (!Array.isArray(items) || !items.length) {
    body.innerHTML = `<tr class="empty-row"><td colspan="5">${emptyMessage}</td></tr>`;
    return;
  }

  items.slice().reverse().forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = rowBuilder(item);
    body.appendChild(tr);
  });
}

function attachLogRowHandlers(s) {
  const reversed = (s.opportunity_log || []).slice().reverse();
  document.querySelectorAll('#logBody tr').forEach((tr, i) => {
    const item = reversed[i] || {};
    tr.dataset.pair = item.pair || '';
    tr.dataset.seriesIndex = item.series_index ?? '';
    tr.addEventListener('click', () => {
      selectedPoint = {
        pair: tr.dataset.pair || null,
        series_index: normalizeIndex(tr.dataset.seriesIndex)
      };
      setActiveRow('logBody', tr);
      if (stateCache) {
        const source = getPaperEventsSource(stateCache);
        renderChart(stateCache, source.items);
      }
    });
  });
}

function attachPaperRowHandlers(s, paperItems) {
  const reversed = (paperItems || []).slice().reverse();
  const keys = getSeriesKeys(s);
  const x = s.series_timestamps || [];

  document.querySelectorAll('#paperBody tr').forEach((tr, i) => {
    const item = reversed[i] || {};
    const pair = getEventPair(item, keys);
    const idx = resolveEventIndex(item, x);

    tr.dataset.pair = keys.includes(pair) ? pair : '';
    tr.dataset.seriesIndex = idx ?? '';

    tr.addEventListener('click', () => {
      selectedPoint = {
        pair: tr.dataset.pair || null,
        series_index: normalizeIndex(tr.dataset.seriesIndex)
      };
      setActiveRow('paperBody', tr);
      if (stateCache) {
        const source = getPaperEventsSource(stateCache);
        renderChart(stateCache, source.items);
      }
    });
  });
}

function renderAll(s) {
  stateCache = s;

  const paperSource = getPaperEventsSource(s);
  const paperItems = paperSource.items || [];

  document.getElementById('modeLabel').textContent = `Modo: ${s.mode || '?'}`;
  document.getElementById('paperSourceBox').textContent =
    `Paper source: ${paperSource.name} | rows: ${paperItems.length}`;
  renderRisk(s.risk_report || {});
  renderNotes(s.notes || []);
  renderChart(s, paperItems);

  renderRows('logBody', s.opportunity_log, item => `
    <td>${item.time || '-'}</td>
    <td>${item.pair || '-'}</td>
    <td><span class="pill ${signalClass(item.signal)}">${item.signal || 'NO TRADE'}</span></td>
    <td>${fmt(item.zscore,4)}</td>
    <td>${fmt(item.edge_bps,2)}</td>
    <td>${item.eligible === false ? (item.reject_reason || 'Rechazada') : 'OK'}</td>
  `, 'Sin oportunidades');

  renderRows('paperBody', paperItems, item => `
    <td>${getEventTime(item)}</td>
    <td><span class="pill ${paperClass(getEventType(item))}">${getEventType(item)}</span></td>
    <td>${getEventPair(item, getSeriesKeys(s))}</td>
    <td>${getEventSide(item)}</td>
    <td>${fmt(getEventPnl(item),2)}</td>
  `, 'Sin eventos de paper trading');

  renderRows('alertsBody', s.alerts_sent, item => `
    <td>${item.time || '-'}</td>
    <td>${item.pair || '-'}</td>
    <td>${item.signal || '-'}</td>
    <td>${fmt(item.zscore,4)}</td>
    <td>${(item.channels || []).join(', ')}</td>
  `, 'Sin alertas');

  renderRows('positionsBody', s.paper_positions, item => `
    <td>${item.pair || '-'}</td>
    <td>${item.side || '-'}</td>
    <td>${fmt(item.entry_zscore,4)}</td>
    <td>${fmt(item.entry_ratio,8)}</td>
    <td>${fmt(item.size_notional,2)}</td>
  `, 'Sin posiciones abiertas');

  attachLogRowHandlers(s);
  attachPaperRowHandlers(s, paperItems);
}

async function refresh() {
  try {
    const r = await fetch('/api/state');
    const data = await r.json();
    renderAll(data);
  } catch (e) {
    console.error(e);
    document.getElementById('debugBox').textContent = 'Error cargando /api/state';
  }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
